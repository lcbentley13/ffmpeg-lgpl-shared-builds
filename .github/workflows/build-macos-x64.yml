name: build-macos-x64

on:
  workflow_call:
    inputs:
      tag:
        description: "FFmpeg Version"
        required: true
        type: string

jobs:
  build:
    runs-on: macos-26-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout FFmpeg
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          ref: n${{ inputs.tag }}
          path: FFmpeg

      - name: Generate README
        env:
          TAG: ${{ inputs.tag || github.event.inputs.tag }}
        run: |
          short_sha="$(git -C FFmpeg rev-parse --short HEAD)"
          echo "SHORT_SHA=${short_sha}" >> "$GITHUB_ENV"
          source_archive="FFmpeg-${TAG}-${short_sha}-source-code.tar.xz"
          sed \
            -e "s|%%Platform%%|macos-x64|g" \
            -e "s|%%FFmpeg-Version%%|${TAG} (${short_sha})|g" \
            -e "s|%%Source-Code-Archive%%|${source_archive}|g" \
            README.md > FFmpeg/README.md
          python3 -c "
          content = open('FFmpeg/README.md').read()
          script = 'brew install nasm\n./configure --arch=x86_64 --enable-shared --disable-programs --disable-doc --prefix=output\nmake\nmake install'
          content = content.replace('%%Compilation-Script%%', script)
          open('FFmpeg/README.md', 'w').write(content)
          "

      - name: Install NASM
        run: brew install nasm

      - name: Configure
        working-directory: FFmpeg
        run: ./configure --arch=x86_64 --enable-shared --disable-programs --disable-doc --prefix=output

      - name: Build
        working-directory: FFmpeg
        run: make

      - name: Install
        working-directory: FFmpeg
        run: make install

      - name: Prepare artifact
        run: |
          mkdir -p FFmpeg/artifact/lib
          shopt -s nullglob
          for f in FFmpeg/output/lib/lib*.dylib; do
            name="$(basename "$f")"
            [[ "$name" =~ ^lib[^.]+\.dylib$ ]] || continue
            cp -L "$f" FFmpeg/artifact/lib/
          done
          if ! ls FFmpeg/artifact/lib/*.dylib >/dev/null 2>&1; then
            echo "::error::No .dylib files found in FFmpeg/output/lib/"
            ls -la FFmpeg/output/lib/ || true
            exit 1
          fi
          cp FFmpeg/README.md FFmpeg/artifact/README.md

          artifacts_path="FFmpeg-${{ inputs.tag || github.event.inputs.tag }}-${{ env.SHORT_SHA }}-macos-x64.tar.xz"
          echo "ARTIFACTS_PATH=${artifacts_path}" >> "$GITHUB_ENV"
          tar -cJf "$artifacts_path" FFmpeg/artifact/

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          path: ${{ env.ARTIFACTS_PATH }}
