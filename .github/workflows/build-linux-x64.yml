name: build-linux-x64

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'FFmpeg Version'
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: 'FFmpeg Version'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04
    env:
      LIB_EXT: so
      LIB_GLOB: output/lib/*.so

    steps:
      - name: Checkout FFmpeg
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          ref: n${{ inputs.tag }}
          path: FFmpeg

      - name: Set source archive name
        working-directory: FFmpeg
        run: |
          source_short_sha="$(git rev-parse --short HEAD)"
          echo "SOURCE_ARCHIVE=FFmpeg-${{ inputs.tag || github.event.inputs.tag }}-${source_short_sha}-source-code.tar.xz" >> "$GITHUB_ENV"

      - name: Generate source compliance files
        working-directory: FFmpeg
        run: |
          git diff > changes.diff
          cp COPYING.LGPLv2.1 LICENSE
          cat > "Compilation Guide.txt" <<EOF
          These libraries were built from the FFmpeg source code using GitHub Actions.
          Platform: linux-x64
          Runner: ubuntu-24.04
          FFmpeg Version: ${{ inputs.tag || github.event.inputs.tag }} ($(git rev-parse --short HEAD))

          sudo apt-get update
          sudo apt-get install -y nasm
          ./configure --arch=x86_64 --enable-shared --disable-programs --disable-doc --prefix=output
          make
          make install
          EOF

      - name: Archive source code
        working-directory: FFmpeg
        run: |
          mkdir -p dist
          archive_path="$RUNNER_TEMP/${SOURCE_ARCHIVE}"
          XZ_OPT='-9e' tar -cJf "$archive_path" --exclude='./.git' --exclude='./doc' --exclude='./tests' .
          mv "$archive_path" "dist/${SOURCE_ARCHIVE}"

      - name: Install NASM
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm

      - name: Configure
        working-directory: FFmpeg
        run: ./configure --arch=x86_64 --enable-shared --disable-programs --disable-doc --prefix=output

      - name: Build
        working-directory: FFmpeg
        run: make

      - name: Install
        working-directory: FFmpeg
        run: make install

      - name: Prepare artifact bundle
        working-directory: FFmpeg
        run: |
          mkdir -p artifact_bundle
          mkdir -p artifact_bundle/lib
          cp "dist/${SOURCE_ARCHIVE}" artifact_bundle/
          cp LICENSE artifact_bundle/

          shopt -s nullglob
          for lib in ${{ env.LIB_GLOB }}; do
            [ -e "$lib" ] || continue
            lib_name="$(basename "$lib")"

            # Keep only the main library names (no ABI/version suffix).
            if [[ ! "$lib_name" =~ ^lib[^.]+\.${{ env.LIB_EXT }}$ ]]; then
              continue
            fi

            if [[ "$lib_name" =~ \.${{ env.LIB_EXT }}$ ]]; then
              cp -L "$lib" "artifact_bundle/lib/$lib_name"
            fi
          done

          lib_count="$(find artifact_bundle/lib -maxdepth 1 -type f -name '*.${{ env.LIB_EXT }}' | wc -l | tr -d ' ')"
          if [[ "$lib_count" -eq 0 ]]; then
            echo "No matching .${{ env.LIB_EXT }} files were found for linux-x64" >&2
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg-${{ inputs.tag || github.event.inputs.tag }}-linux-x64
          path: FFmpeg/artifact_bundle/*
