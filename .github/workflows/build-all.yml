name: build-all

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "FFmpeg Version"
        required: true
        type: string

permissions:
  contents: write

jobs:
  bundle-source-code:
    uses: ./.github/workflows/bundle-source-code.yml
    with:
      tag: ${{ inputs.tag }}

  macos-x64:
    uses: ./.github/workflows/build-macos-x64.yml
    with:
      tag: ${{ inputs.tag }}

  macos-arm64:
    uses: ./.github/workflows/build-macos-arm64.yml
    with:
      tag: ${{ inputs.tag }}

  windows-x64:
    uses: ./.github/workflows/build-windows-x64.yml
    with:
      tag: ${{ inputs.tag }}

  windows-arm64:
    uses: ./.github/workflows/build-windows-arm64.yml
    with:
      tag: ${{ inputs.tag }}

  linux-x64:
    uses: ./.github/workflows/build-linux-x64.yml
    with:
      tag: ${{ inputs.tag }}

  linux-arm64:
    uses: ./.github/workflows/build-linux-arm64.yml
    with:
      tag: ${{ inputs.tag }}

  publish-release:
    needs:
      - bundle-source-code
      - macos-x64
      - macos-arm64
      - windows-x64
      - windows-arm64
      - linux-x64
      - linux-arm64
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts
          merge-multiple: false

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: FFmpeg v${{ inputs.tag }}
          tag_name: v${{ inputs.tag }}
          files: release-artifacts/**
