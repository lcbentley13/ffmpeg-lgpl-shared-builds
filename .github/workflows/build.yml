name: build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'FFmpeg Version'
        required: true
        type: string

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: macos-arm64
            runs_on: macos-latest
            lib_ext: dylib
          - target: windows-x64
            runs_on: windows-latest
            lib_ext: dll
          - target: windows-arm64
            runs_on: windows-11-arm
            lib_ext: dll
          - target: linux-x64
            runs_on: ubuntu-latest
            lib_ext: so
          - target: linux-arm64
            runs_on: ubuntu-24.04-arm
            lib_ext: so
    runs-on: ${{ matrix.runs_on }}
    defaults:
      run:
        shell: bash
    env:
      SOURCE_ARCHIVE: FFmpeg-${{ inputs.tag }}-${{ matrix.target }}-source-code.tar.xz

    steps:
      - name: Checkout packaging repository
        uses: actions/checkout@v4
        with:
          path: packaging

      - name: Checkout FFmpeg
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          ref: n${{ inputs.tag }}
          path: FFmpeg

      - name: Generate source compliance files
        working-directory: FFmpeg
        run: |
          git diff > changes.diff
          cp "$GITHUB_WORKSPACE/packaging/Compilation Guide.txt" .
          cp COPYING.LGPLv2.1 LICENSE

      - name: Install NASM (linux-x64 only)
        if: matrix.target == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm

      - name: Install NASM (windows-arm64 only)
        if: matrix.target == 'windows-arm64'
        run: |
          choco install nasm --no-progress -y
          export PATH="$PATH:/c/ProgramData/chocolatey/bin"
          nasm --version

      - name: Configure
        working-directory: FFmpeg
        run: ./configure --enable-shared --disable-programs --disable-doc --prefix=output

      - name: Build
        working-directory: FFmpeg
        run: make

      - name: Install
        working-directory: FFmpeg
        run: make install

      - name: Archive source code
        working-directory: FFmpeg
        run: |
          mkdir -p dist
          archive_path="$RUNNER_TEMP/${SOURCE_ARCHIVE}"
          tar --exclude='./dist' --exclude='./output' -cJf "$archive_path" .
          mv "$archive_path" "dist/${SOURCE_ARCHIVE}"

      - name: Prepare artifact bundle
        working-directory: FFmpeg
        run: |
          mkdir -p artifact_bundle
          cp "dist/${SOURCE_ARCHIVE}" artifact_bundle/
          cp LICENSE artifact_bundle/

          shopt -s nullglob
          for lib in output/lib/*.${{ matrix.lib_ext }}; do
            [ -e "$lib" ] || continue
            lib_name="$(basename "$lib")"

            # Keep only the main library names for Unix builds (no ABI/version suffix).
            if [[ "${{ matrix.lib_ext }}" == "so" || "${{ matrix.lib_ext }}" == "dylib" ]]; then
              if [[ ! "$lib_name" =~ ^lib[^.]+\.${{ matrix.lib_ext }}$ ]]; then
                continue
              fi
            fi

            # Windows builds use .dll outputs; include top-level .dll names.
            if [[ "${{ matrix.lib_ext }}" == "dll" && ! "$lib_name" =~ ^[^.]+\.dll$ ]]; then
              continue
            fi

            if [[ "$lib_name" =~ \.${{ matrix.lib_ext }}$ ]]; then
              cp -L "$lib" "artifact_bundle/$lib_name"
            fi
          done

          lib_count="$(find artifact_bundle -maxdepth 1 -type f -name '*.${{ matrix.lib_ext }}' | wc -l | tr -d ' ')"
          if [[ "$lib_count" -eq 0 ]]; then
            echo "No matching .${{ matrix.lib_ext }} files were found in output/lib" >&2
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg-${{ inputs.tag }}-${{ matrix.target }}
          path: FFmpeg/artifact_bundle/*
