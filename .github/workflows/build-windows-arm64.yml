name: build-windows-arm64

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'FFmpeg Version'
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: 'FFmpeg Version'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-11-arm
    env:
      LIB_EXT: dll
      LIB_GLOB: output/bin/*.dll

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout FFmpeg
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          ref: n${{ inputs.tag }}
          path: FFmpeg

      - name: Generate README
        shell: bash
        env:
          TAG: ${{ inputs.tag || github.event.inputs.tag }}
        run: |
          short_sha="$(git -C FFmpeg rev-parse --short HEAD)"
          source_archive="FFmpeg-${TAG}-${short_sha}-source-code.tar.xz"
          sed \
            -e "s|%%Platform%%|windows-arm64|g" \
            -e "s|%%FFmpeg-Version%%|${TAG} (${short_sha})|g" \
            -e "s|%%Source-Code-Archive%%|${source_archive}|g" \
            README.md > FFmpeg/README.md
          python3 -c "
          content = open('FFmpeg/README.md').read()
          script = './configure --arch=aarch64 --enable-shared --disable-programs --disable-doc --prefix=output --cc=clang --cxx=clang++\nmake\nmake install'
          content = content.replace('%%Compilation-Script%%', script)
          open('FFmpeg/README.md', 'w').write(content)
          "
      
      - name: Upload README
        uses: actions/upload-artifact@v7
        with:
          name: README.md
          path: FFmpeg/README.md
          archive: false

      - name: Set up MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: >-
            make
            diffutils
            nasm
            pkgconf
            mingw-w64-clang-aarch64-toolchain

      - name: Configure
        shell: msys2 {0}
        working-directory: FFmpeg
        run: ./configure --arch=aarch64 --enable-shared --disable-programs --disable-doc --prefix=output --cc=clang --cxx=clang++

      - name: Build
        shell: msys2 {0}
        working-directory: FFmpeg
        run: make

      - name: Install
        shell: msys2 {0}
        working-directory: FFmpeg
        run: make install

      - name: Prepare artifact bundle
        shell: bash
        working-directory: FFmpeg
        run: |
          mkdir -p artifact_bundle
          mkdir -p artifact_bundle/lib
          cp "dist/${SOURCE_ARCHIVE}" artifact_bundle/
          cp LICENSE artifact_bundle/

          shopt -s nullglob
          for lib in ${{ env.LIB_GLOB }}; do
            [ -e "$lib" ] || continue
            lib_name="$(basename "$lib")"

            # Windows builds use .dll outputs; include top-level .dll names.
            if [[ ! "$lib_name" =~ ^[^.]+\.dll$ ]]; then
              continue
            fi

            if [[ "$lib_name" =~ \.${{ env.LIB_EXT }}$ ]]; then
              cp -L "$lib" "artifact_bundle/lib/$lib_name"
            fi
          done

          lib_count="$(find artifact_bundle/lib -maxdepth 1 -type f -name '*.${{ env.LIB_EXT }}' | wc -l | tr -d ' ')"
          if [[ "$lib_count" -eq 0 ]]; then
            echo "No matching .${{ env.LIB_EXT }} files were found for windows-arm64" >&2
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: FFmpeg-${{ inputs.tag || github.event.inputs.tag }}-windows-arm64
          path: FFmpeg/artifact_bundle/*
