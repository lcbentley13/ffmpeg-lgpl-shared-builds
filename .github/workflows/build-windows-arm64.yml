name: build-windows-arm64

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'FFmpeg Version'
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: 'FFmpeg Version'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-11-arm
    env:
      SOURCE_ARCHIVE: FFmpeg-${{ inputs.tag || github.event.inputs.tag }}-windows-arm64-source-code.tar.xz
      LIB_EXT: dll
      LIB_GLOB: output/bin/*.dll

    steps:
      - name: Checkout FFmpeg
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          ref: n${{ inputs.tag }}
          path: FFmpeg

      - name: Generate source compliance files
        working-directory: FFmpeg
        shell: bash
        run: |
          git diff > changes.diff
          cp COPYING.LGPLv2.1 LICENSE
          cat > "Compilation Guide.txt" <<EOF
          These libraries were built from the FFmpeg source code using GitHub Actions.
          Platform: windows-arm64
          Runner: windows-11-arm (MSYS2 CLANGARM64)
          FFmpeg Version: ${{ inputs.tag || github.event.inputs.tag }} ($(git rev-parse --short HEAD))

          ./configure --arch=aarch64 --enable-shared --disable-programs --disable-doc --prefix=output --cc=clang --cxx=clang++
          make
          make install
          EOF

      - name: Archive source code
        shell: bash
        working-directory: FFmpeg
        run: |
          mkdir -p dist
          archive_path="$(cygpath -u "$RUNNER_TEMP")/${SOURCE_ARCHIVE}"
          tar -cJf "$archive_path" .
          mv "$archive_path" "dist/${SOURCE_ARCHIVE}"

      - name: Set up MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: CLANGARM64
          update: true
          install: >-
            make
            diffutils
            nasm
            pkgconf
            mingw-w64-clang-aarch64-toolchain

      - name: Configure
        shell: msys2 {0}
        working-directory: FFmpeg
        run: ./configure --arch=aarch64 --enable-shared --disable-programs --disable-doc --prefix=output --cc=clang --cxx=clang++

      - name: Build
        shell: msys2 {0}
        working-directory: FFmpeg
        run: make

      - name: Install
        shell: msys2 {0}
        working-directory: FFmpeg
        run: make install

      - name: Prepare artifact bundle
        shell: bash
        working-directory: FFmpeg
        run: |
          mkdir -p artifact_bundle
          mkdir -p artifact_bundle/lib
          cp "dist/${SOURCE_ARCHIVE}" artifact_bundle/
          cp LICENSE artifact_bundle/

          shopt -s nullglob
          for lib in ${{ env.LIB_GLOB }}; do
            [ -e "$lib" ] || continue
            lib_name="$(basename "$lib")"

            # Windows builds use .dll outputs; include top-level .dll names.
            if [[ ! "$lib_name" =~ ^[^.]+\.dll$ ]]; then
              continue
            fi

            if [[ "$lib_name" =~ \.${{ env.LIB_EXT }}$ ]]; then
              cp -L "$lib" "artifact_bundle/lib/$lib_name"
            fi
          done

          lib_count="$(find artifact_bundle/lib -maxdepth 1 -type f -name '*.${{ env.LIB_EXT }}' | wc -l | tr -d ' ')"
          if [[ "$lib_count" -eq 0 ]]; then
            echo "No matching .${{ env.LIB_EXT }} files were found for windows-arm64" >&2
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg-${{ inputs.tag || github.event.inputs.tag }}-windows-arm64
          path: FFmpeg/artifact_bundle/*
