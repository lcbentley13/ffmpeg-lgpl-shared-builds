name: build-macos-arm64

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'FFmpeg Version'
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: 'FFmpeg Version'
        required: true
        type: string

jobs:
  build:
    runs-on: macos-26


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout FFmpeg
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          ref: n${{ inputs.tag }}
          path: FFmpeg

      - name: Generate README
        env:
          TAG: ${{ inputs.tag || github.event.inputs.tag }}
        run: |
          short_sha="$(git -C FFmpeg rev-parse --short HEAD)"
          source_archive="FFmpeg-${TAG}-${short_sha}-source-code.tar.xz"
          sed \
            -e "s|%%Platform%%|macos-arm64|g" \
            -e "s|%%FFmpeg-Version%%|${TAG} (${short_sha})|g" \
            -e "s|%%Source-Code-Archive%%|${source_archive}|g" \
            README.md > FFmpeg/README.md
          python3 -c "
          content = open('FFmpeg/README.md').read()
          script = './configure --arch=aarch64 --enable-shared --disable-programs --disable-doc --prefix=output\nmake\nmake install'
          content = content.replace('%%Compilation-Script%%', script)
          open('FFmpeg/README.md', 'w').write(content)
          "

      - name: Configure
        working-directory: FFmpeg
        run: ./configure --arch=aarch64 --enable-shared --disable-programs --disable-doc --prefix=output

      - name: Build
        working-directory: FFmpeg
        run: make

      - name: Install
        working-directory: FFmpeg
        run: make install

      - name: Prepare artifact
        run: |
          mkdir -p FFmpeg/artifact/lib
          find FFmpeg/output/lib -mindepth 1 -maxdepth 1 -type f -regex '.*/lib[^./]+\.dylib' -exec cp {} FFmpeg/artifact/lib/ \;
          cp FFmpeg/README.md FFmpeg/artifact/README.md

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: FFmpeg-${{ inputs.tag || github.event.inputs.tag }}-macos-arm64
          path: FFmpeg/artifact/
