name: build-windows-x64

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'FFmpeg Version'
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: 'FFmpeg Version'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest
    env:
      LIB_EXT: dll
      LIB_GLOB: output/bin/*.dll

    steps:
      - name: Checkout FFmpeg
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          ref: n${{ inputs.tag }}
          path: FFmpeg

      - name: Generate compilation guide
        working-directory: FFmpeg
        shell: bash
        run: |
          cat > "compilation-guide.txt" <<EOF
          These libraries were built from the FFmpeg source code using GitHub Actions.
          Platform: windows-x64
          Runner: windows-latest (MSYS2 MINGW64)
          FFmpeg Version: ${{ inputs.tag || github.event.inputs.tag }} ($(git rev-parse --short HEAD))

          ./configure --arch=x86_64 --enable-shared --disable-programs --disable-doc --prefix=output
          make
          make install
          EOF

      - name: Upload compilation guide
        uses: actions/upload-artifact@v4
        with:
          name: compilation-guide-windows-x64.txt
          path: FFmpeg/compilation-guide.txt
          archive: false

      - name: Set up MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            diffutils
            nasm
            pkgconf
            mingw-w64-x86_64-gcc

      - name: Configure
        shell: msys2 {0}
        working-directory: FFmpeg
        run: ./configure --arch=x86_64 --enable-shared --disable-programs --disable-doc --prefix=output

      - name: Build
        shell: msys2 {0}
        working-directory: FFmpeg
        run: make

      - name: Install
        shell: msys2 {0}
        working-directory: FFmpeg
        run: make install

      - name: Prepare artifact bundle
        shell: bash
        working-directory: FFmpeg
        run: |
          mkdir -p artifact_bundle
          mkdir -p artifact_bundle/lib
          cp "dist/${SOURCE_ARCHIVE}" artifact_bundle/
          cp LICENSE artifact_bundle/

          shopt -s nullglob
          for lib in ${{ env.LIB_GLOB }}; do
            [ -e "$lib" ] || continue
            lib_name="$(basename "$lib")"

            # Windows builds use .dll outputs; include top-level .dll names.
            if [[ ! "$lib_name" =~ ^[^.]+\.dll$ ]]; then
              continue
            fi

            if [[ "$lib_name" =~ \.${{ env.LIB_EXT }}$ ]]; then
              cp -L "$lib" "artifact_bundle/lib/$lib_name"
            fi
          done

          lib_count="$(find artifact_bundle/lib -maxdepth 1 -type f -name '*.${{ env.LIB_EXT }}' | wc -l | tr -d ' ')"
          if [[ "$lib_count" -eq 0 ]]; then
            echo "No matching .${{ env.LIB_EXT }} files were found for windows-x64" >&2
            exit 1
          fi

      - name: Upload libraries
        uses: actions/upload-artifact@v4
        with:
          name: FFmpeg-${{ inputs.tag || github.event.inputs.tag }}-windows-x64
          path: FFmpeg/artifact_bundle/*
      
