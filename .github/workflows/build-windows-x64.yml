name: build-windows-x64

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'FFmpeg Version'
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: 'FFmpeg Version'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-latest


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout FFmpeg
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          ref: n${{ inputs.tag }}
          path: FFmpeg

      - name: Generate README
        shell: bash
        env:
          TAG: ${{ inputs.tag || github.event.inputs.tag }}
        run: |
          short_sha="$(git -C FFmpeg rev-parse --short HEAD)"
          echo "SHORT_SHA=${short_sha}" >> "$GITHUB_ENV"
          source_archive="FFmpeg-${TAG}-${short_sha}-source-code.tar.xz"
          sed \
            -e "s|%%Platform%%|windows-x64|g" \
            -e "s|%%FFmpeg-Version%%|${TAG} (${short_sha})|g" \
            -e "s|%%Source-Code-Archive%%|${source_archive}|g" \
            README.md > FFmpeg/README.md
          python3 -c "
          content = open('FFmpeg/README.md').read()
          script = './configure --arch=x86_64 --enable-shared --disable-programs --disable-doc --prefix=output\nmake\nmake install'
          content = content.replace('%%Compilation-Script%%', script)
          open('FFmpeg/README.md', 'w').write(content)
          "

      - name: Set up MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            make
            diffutils
            nasm
            pkgconf
            mingw-w64-x86_64-gcc

      - name: Configure
        shell: msys2 {0}
        working-directory: FFmpeg
        run: ./configure --arch=x86_64 --enable-shared --disable-programs --disable-doc --prefix=output

      - name: Build
        shell: msys2 {0}
        working-directory: FFmpeg
        run: make

      - name: Install
        shell: msys2 {0}
        working-directory: FFmpeg
        run: make install

      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p FFmpeg/artifact/lib
          find FFmpeg/output/bin -mindepth 1 -maxdepth 1 -type f -name '*.dll' -exec cp {} FFmpeg/artifact/lib/ \;
          for f in FFmpeg/artifact/lib/*-*.dll; do
            mv "$f" "$(echo "$f" | sed 's/-[0-9]*\.dll$/.dll/')"
          done
          cp FFmpeg/README.md FFmpeg/artifact/README.md

      - name: Upload libraries
        uses: actions/upload-artifact@v7
        with:
          name: FFmpeg-${{ inputs.tag || github.event.inputs.tag }}-${{ env.SHORT_SHA }}-windows-x64
          path: FFmpeg/artifact/
      
