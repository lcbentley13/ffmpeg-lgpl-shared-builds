name: build-linux-arm64

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'FFmpeg Version'
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: 'FFmpeg Version'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04-arm


    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout FFmpeg
        uses: actions/checkout@v4
        with:
          repository: FFmpeg/FFmpeg
          ref: n${{ inputs.tag }}
          path: FFmpeg

      - name: Generate README
        env:
          TAG: ${{ inputs.tag || github.event.inputs.tag }}
        run: |
          short_sha="$(git -C FFmpeg rev-parse --short HEAD)"
          source_archive="FFmpeg-${TAG}-${short_sha}-source-code.tar.xz"
          sed \
            -e "s|%%Platform%%|linux-arm64|g" \
            -e "s|%%FFmpeg-Version%%|${TAG} (${short_sha})|g" \
            -e "s|%%Source-Code-Archive%%|${source_archive}|g" \
            README.md > FFmpeg/README.md
          python3 -c "
          content = open('FFmpeg/README.md').read()
          script = './configure --arch=aarch64 --enable-shared --disable-programs --disable-doc --prefix=output\nmake\nmake install'
          content = content.replace('%%Compilation-Script%%', script)
          open('FFmpeg/README.md', 'w').write(content)
          "

      - name: Upload README
        uses: actions/upload-artifact@v7
        with:
          name: README.md
          path: FFmpeg/README.md
          archive: false

      - name: Configure
        working-directory: FFmpeg
        run: ./configure --arch=aarch64 --enable-shared --disable-programs --disable-doc --prefix=output

      - name: Build
        working-directory: FFmpeg
        run: make

      - name: Install
        working-directory: FFmpeg
        run: make install

      - name: Prepare library output
        working-directory: FFmpeg/output/lib
        run: |
          find . -mindepth 1 -maxdepth 1 -type d -exec rm -rf {} +
          find . -mindepth 1 -maxdepth 1 -type f ! -name 'lib*.so' -delete

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: FFmpeg-${{ inputs.tag || github.event.inputs.tag }}-linux-arm64
          path: FFmpeg/output/lib/
